<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday 🎂</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #d4a853;
      --gold-light: #f0cc80;
      --rose: #c2576a;
      --deep: #0d0a14;
      --mid: #1a1228;
      --text: #f5ede0;
      --soft: rgba(212,168,83,0.12);
    }

    html, body {
      width: 100%; min-height: 100vh;
      background: var(--deep);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── Custom cursor ── */
    #cursor {
      position: fixed; width: 12px; height: 12px;
      background: var(--gold); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s, background 0.3s, width 0.2s, height 0.2s;
      mix-blend-mode: screen;
    }
    #cursor-ring {
      position: fixed; width: 36px; height: 36px;
      border: 1px solid rgba(212,168,83,0.5);
      border-radius: 50%; pointer-events: none; z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.15s ease, width 0.3s, height 0.3s, opacity 0.3s;
    }
    body:has(button:hover) #cursor { width: 20px; height: 20px; background: var(--rose); }
    body:has(button:hover) #cursor-ring { width: 50px; height: 50px; }

    /* ── Cursor trail ── */
    .trail-dot {
      position: fixed; border-radius: 50%; pointer-events: none;
      z-index: 9990; transform: translate(-50%, -50%);
      animation: trail-fade 0.6s ease forwards;
    }
    @keyframes trail-fade { 0% { opacity: 0.8; transform: translate(-50%,-50%) scale(1); } 100% { opacity: 0; transform: translate(-50%,-50%) scale(0); } }

    /* ── Stars ── */
    #stars-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── Confetti + fireworks canvas ── */
    #confetti-canvas { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

    /* ── Shooting stars canvas ── */
    #shoot-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    /* ── Main wrapper ── */
    .scene {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 1.5rem 5rem;
    }

    /* ── Glow orbs ── */
    .orb { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 1; }
    .orb-1 { width: 500px; height: 500px; top: -160px; left: -160px; background: radial-gradient(circle, rgba(194,87,106,0.25), transparent 70%); animation: drift 14s ease-in-out infinite alternate; }
    .orb-2 { width: 600px; height: 600px; bottom: -200px; right: -200px; background: radial-gradient(circle, rgba(212,168,83,0.2), transparent 70%); animation: drift 18s ease-in-out infinite alternate-reverse; }
    .orb-3 { width: 350px; height: 350px; top: 40%; left: 50%; transform: translate(-50%,-50%); background: radial-gradient(circle, rgba(130,80,200,0.15), transparent 70%); animation: pulse-orb 6s ease-in-out infinite; }
    @keyframes drift { from { transform: translate(0,0); } to { transform: translate(40px,30px); } }
    @keyframes pulse-orb { 0%,100% { transform: translate(-50%,-50%) scale(1); opacity:0.6; } 50% { transform: translate(-50%,-50%) scale(1.3); opacity:1; } }

    /* ── Deco line ── */
    .deco-line { width: 180px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 1.2rem auto; animation: line-fade 2s ease 0.5s both; }
    @keyframes line-fade { from { opacity:0; width:0; } to { opacity:1; width:180px; } }

    /* ── Crown ── */
    .crown {
      font-size: 4.5rem; margin-bottom: 0.5rem;
      animation: crown-pop 1s cubic-bezier(.34,1.56,.64,1) both, float 4s ease-in-out infinite 1s;
      cursor: pointer; user-select: none; transition: filter 0.3s;
      display: inline-block;
    }
    .crown:hover { filter: drop-shadow(0 0 20px var(--gold)); }
    @keyframes crown-pop { from { transform: scale(0) rotate(-20deg); opacity:0; } to { transform: scale(1) rotate(0deg); opacity:1; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    /* ── Main heading ── */
    .heading-wrap { text-align: center; margin-bottom: 0.5rem; }

    .happy {
      display: block; font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-style: italic;
      font-size: clamp(1.4rem, 4vw, 2rem); color: var(--gold-light);
      letter-spacing: 0.35em; text-transform: uppercase;
      opacity: 0; animation: fade-up 1s ease 0.4s forwards;
    }
    .birthday {
      display: block; font-family: 'Playfair Display', serif;
      font-weight: 700; font-size: clamp(3.5rem, 12vw, 8rem); line-height: 1.1;
      padding-bottom: 0.1em;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, var(--rose) 70%, var(--gold-light) 100%);
      background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: fade-up 1s ease 0.6s forwards, shimmer 4s linear infinite 1.5s;
      opacity: 0; cursor: pointer;
    }
    .birthday:hover { animation: fade-up 1s ease 0.6s forwards, shimmer 0.8s linear infinite, jiggle 0.5s ease; }
    @keyframes jiggle { 0%,100%{transform:rotate(0);} 25%{transform:rotate(-2deg) scale(1.02);} 75%{transform:rotate(2deg) scale(1.02);} }
    @keyframes shimmer { 0% { background-position:0% 50%; } 100% { background-position:300% 50%; } }

    .to-you {
      display: block; font-family: 'Playfair Display', serif;
      font-weight: 400; font-style: italic;
      font-size: clamp(2rem, 7vw, 4.5rem); color: var(--rose); line-height: 1;
      opacity: 0; animation: fade-up 1s ease 0.8s forwards;
    }
    @keyframes fade-up { from { opacity:0; transform: translateY(30px); } to { opacity:1; transform: translateY(0); } }

    /* ── Name badge ── */
    .name-badge {
      margin: 2rem auto 0; border: 1px solid var(--gold);
      padding: 0.7rem 2.5rem; text-align: center; position: relative;
      opacity: 0; animation: fade-up 1s ease 1.2s forwards;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .name-badge:hover { box-shadow: 0 0 30px rgba(212,168,83,0.3); border-color: var(--gold-light); }
    .name-badge::before, .name-badge::after { content: '✦'; position: absolute; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: 0.9rem; transition: transform 0.3s; }
    .name-badge::before { left: -1.2rem; }
    .name-badge::after { right: -1.2rem; }
    .name-badge:hover::before { transform: translateY(-50%) rotate(180deg); }
    .name-badge:hover::after { transform: translateY(-50%) rotate(-180deg); }
    .name-text { font-family: 'Playfair Display', serif; font-size: clamp(1.5rem, 5vw, 2.8rem); font-style: italic; color: var(--gold-light); letter-spacing: 0.05em; }

    /* ── Typewriter message card ── */
    .card {
      max-width: 640px; width: 100%; margin: 2.5rem auto 0;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(212,168,83,0.25);
      border-radius: 2px; padding: 2.5rem 3rem; text-align: center;
      backdrop-filter: blur(8px); opacity: 0;
      animation: fade-up 1s ease 1.5s forwards; position: relative; overflow: hidden;
      transition: border-color 0.4s, box-shadow 0.4s;
    }
    .card:hover { border-color: rgba(212,168,83,0.5); box-shadow: 0 0 40px rgba(212,168,83,0.08); }
    .card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(212,168,83,0.06) 0%, transparent 60%); pointer-events: none; }
    .card-corner { position: absolute; width: 40px; height: 40px; border-color: var(--gold); border-style: solid; border-width: 0; transition: width 0.3s, height 0.3s; }
    .card:hover .card-corner { width: 55px; height: 55px; }
    .card-corner.tl { top: 12px; left: 12px; border-top-width: 1px; border-left-width: 1px; }
    .card-corner.tr { top: 12px; right: 12px; border-top-width: 1px; border-right-width: 1px; }
    .card-corner.bl { bottom: 12px; left: 12px; border-bottom-width: 1px; border-left-width: 1px; }
    .card-corner.br { bottom: 12px; right: 12px; border-bottom-width: 1px; border-right-width: 1px; }
    .card-message { font-size: clamp(1rem, 2.5vw, 1.2rem); line-height: 1.9; font-weight: 300; color: rgba(245,237,224,0.88); font-style: italic; min-height: 8rem; }
    #typed-cursor { display: inline-block; width: 2px; height: 1.1em; background: var(--gold); vertical-align: middle; margin-left: 2px; animation: blink-cursor 0.8s step-end infinite; }
    @keyframes blink-cursor { 0%,100%{opacity:1;} 50%{opacity:0;} }

    /* ── Cake section ── */
    .cake-wrap { margin: 2.5rem auto 0; opacity: 0; animation: fade-up 1s ease 1.8s forwards; text-align: center; }
    .cake { font-size: clamp(3rem, 10vw, 6rem); display: block; cursor: pointer; transition: transform 0.2s; display: inline-block; }
    .cake:hover { transform: scale(1.15) rotate(-5deg); }
    .cake:active { transform: scale(0.9); }

    /* ── Interactive candles ── */
    .candles-row { display: flex; justify-content: center; gap: 0.6rem; margin-top: 0.5rem; }
    .candle-btn {
      background: none; border: none; cursor: pointer;
      font-size: 2rem; padding: 0.3rem;
      transition: transform 0.3s; position: relative;
    }
    .candle-btn:hover { transform: scale(1.3); }
    .candle-btn.blown .flame { display: none; }
    .candle-btn.blown::after { content: '💨'; position: absolute; top: -1.5rem; left: 50%; transform: translateX(-50%); font-size: 1rem; animation: puff 1s ease forwards; }
    @keyframes puff { from{opacity:1;transform:translateX(-50%) scale(0.5);} to{opacity:0;transform:translateX(-50%) scale(1.5) translateY(-20px);} }
    #blow-hint { font-size: 0.75rem; letter-spacing: 0.15em; color: rgba(212,168,83,0.5); margin-top: 0.5rem; font-style: italic; transition: opacity 0.5s; }

    /* ── Balloons ── */
    .balloons { position: fixed; bottom: 0; left: 0; width: 100%; pointer-events: none; z-index: 5; }
    .balloon {
      position: absolute; bottom: -120px; font-size: 3.5rem;
      animation: rise linear infinite; animation-delay: var(--delay); animation-duration: var(--dur);
      left: var(--left); opacity: 0.8; cursor: pointer; pointer-events: all;
      transition: filter 0.2s;
    }
    .balloon:hover { filter: drop-shadow(0 0 15px rgba(255,255,255,0.5)); animation-play-state: paused; }
    @keyframes rise { 0% { transform: translateY(0) rotate(0deg); opacity:0.8; } 100% { transform: translateY(-110vh) rotate(15deg); opacity:0; } }

    /* ── Countdown / age reveal ── */
    .age-reveal {
      margin: 2rem auto 0; text-align: center;
      opacity: 0; animation: fade-up 1s ease 1.9s forwards;
    }
    .age-label { font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(212,168,83,0.6); margin-bottom: 0.5rem; }
    .age-display { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .age-box {
      border: 1px solid rgba(212,168,83,0.3); padding: 0.8rem 1.4rem;
      text-align: center; min-width: 80px; transition: all 0.3s; cursor: default;
    }
    .age-box:hover { border-color: var(--gold); background: rgba(212,168,83,0.08); transform: translateY(-3px); }
    .age-num { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold-light); line-height: 1; }
    .age-unit { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(212,168,83,0.5); }

    /* ── Wish bubbles ── */
    #wish-cloud { position: fixed; inset: 0; pointer-events: none; z-index: 8; }
    .wish-bubble {
      position: absolute; background: rgba(13,10,20,0.85); border: 1px solid rgba(212,168,83,0.35);
      padding: 0.6rem 1.2rem; font-style: italic; font-size: 0.9rem; color: var(--gold-light);
      border-radius: 2px; pointer-events: none; white-space: nowrap;
      animation: bubble-float 3.5s ease forwards;
    }
    @keyframes bubble-float { 0%{opacity:0;transform:translateY(0) scale(0.8);} 15%{opacity:1;transform:translateY(-15px) scale(1);} 85%{opacity:1;} 100%{opacity:0;transform:translateY(-80px) scale(0.9);} }

    /* ── Sparkle stars ── */
    .sparkle {
      position: fixed; pointer-events: none; z-index: 9997; font-size: 1rem;
      animation: sparkle-anim 0.8s ease forwards;
    }
    @keyframes sparkle-anim { 0%{opacity:1;transform:scale(0) rotate(0deg);} 50%{opacity:1;transform:scale(1.5) rotate(180deg);} 100%{opacity:0;transform:scale(0) rotate(360deg) translateY(-30px);} }

    /* ── CTA button ── */
    .btn-celebrate {
      margin: 2.5rem auto 0; display: block; background: transparent;
      border: 1px solid var(--gold); color: var(--gold-light);
      font-family: 'Cormorant Garamond', serif; font-size: 1.1rem;
      letter-spacing: 0.25em; text-transform: uppercase;
      padding: 1rem 3rem; cursor: none; position: relative; overflow: hidden;
      transition: color 0.3s; opacity: 0; animation: fade-up 1s ease 2s forwards;
    }
    .btn-celebrate::before { content: ''; position: absolute; inset: 0; background: var(--gold); transform: translateX(-101%); transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); z-index: -1; }
    .btn-celebrate:hover { color: var(--deep); }
    .btn-celebrate:hover::before { transform: translateX(0); }
    .btn-celebrate .btn-ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.3); transform: scale(0); animation: ripple 0.6s ease; pointer-events: none; }
    @keyframes ripple { to { transform: scale(4); opacity: 0; } }

    /* ── Fireworks hint ── */
    .click-hint {
      font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(212,168,83,0.3); margin-top: 0.8rem; text-align: center;
      opacity: 0; animation: fade-up 1s ease 2.5s forwards;
    }

    /* ── Footer ── */
    .footer { margin-top: 2rem; font-size: 0.85rem; letter-spacing: 0.2em; color: rgba(212,168,83,0.4); text-transform: uppercase; opacity: 0; animation: fade-up 1s ease 2.2s forwards; }

    /* ── Music toggle ── */
    #music-btn {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 200;
      background: rgba(13,10,20,0.8); border: 1px solid rgba(212,168,83,0.3);
      color: var(--gold); width: 48px; height: 48px; border-radius: 50%;
      font-size: 1.2rem; cursor: none; display: flex; align-items: center; justify-content: center;
      transition: all 0.3s; backdrop-filter: blur(8px); opacity: 0;
      animation: fade-up 1s ease 2.5s forwards;
    }
    #music-btn:hover { border-color: var(--gold); box-shadow: 0 0 20px rgba(212,168,83,0.3); transform: scale(1.1); }
    #music-btn.playing { background: rgba(212,168,83,0.15); animation: music-pulse 1s ease-in-out infinite 0s, fade-up 1s ease 2.5s forwards; }
    @keyframes music-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(212,168,83,0.4);} 50%{box-shadow:0 0 0 12px rgba(212,168,83,0);} }

    /* ── Parallax wrapper ── */
    .parallax-layer { transition: transform 0.1s linear; will-change: transform; }

    /* ── Mobile cursor fallback ── */
    @media (hover: none) { html,body{cursor:auto;} #cursor,#cursor-ring{display:none;} .btn-celebrate,.candle-btn,.balloon{cursor:pointer;} }
  </style>
</head>
<body>

<!-- Custom cursor -->
<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- Canvases -->
<canvas id="stars-canvas"></canvas>
<canvas id="shoot-canvas"></canvas>
<canvas id="confetti-canvas"></canvas>

<!-- Orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="balloons" id="balloons"></div>
<div id="wish-cloud"></div>

<!-- Music toggle -->
<button id="music-btn" title="Toggle music vibes">♪</button>

<!-- Main scene -->
<div class="scene" id="scene">
  <div class="crown parallax-layer" id="crown" data-speed="0.03">👑</div>

  <div class="heading-wrap parallax-layer" data-speed="0.02">
    <span class="happy">Wishing You A Very</span>
    <span class="birthday" id="bday-word">Happy</span>
    <span class="to-you">Birthday</span>
  </div>

  <div class="deco-line"></div>

  <div class="name-badge">
    <span class="name-text">Bhavana</span>
  </div>

  <div class="card">
    <div class="card-corner tl"></div>
    <div class="card-corner tr"></div>
    <div class="card-corner bl"></div>
    <div class="card-corner br"></div>
    <p class="card-message" id="typed-msg"><span id="typed-cursor"></span></p>
  </div>

  <!-- Live "since birth" counter -->
  <div class="age-reveal">
    <p class="age-label">Celebrating the moments... and the calories 🍔🍟</p>
    <div class="age-display" id="age-display"></div>
  </div>

  <!-- Interactive cake + candles -->
  <div class="cake-wrap">
    <span class="cake" id="cake-emoji">🎂</span>
    <div class="candles-row" id="candles-row"></div>
    <p id="blow-hint">Click the candles to blow them out ✨</p>
  </div>

  <button class="btn-celebrate" id="celebrateBtn">✦ Celebrate ✦</button>
  <p class="click-hint">Click anywhere for fireworks · Hover for magic</p>

  <p class="footer">Made with ♥ (and a lot of patience dealing with you) for you</p>
</div>

<script>
/* =========================================================
   CURSOR
   ========================================================= */
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursor-ring');
let mx = window.innerWidth/2, my = window.innerHeight/2;
let rx = mx, ry = my;
let trail = [];

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';

  // Trail dots
  const dot = document.createElement('div');
  dot.className = 'trail-dot';
  const size = 4 + Math.random() * 4;
  const hue = 35 + Math.random() * 20;
  dot.style.cssText = `left:${mx}px;top:${my}px;width:${size}px;height:${size}px;background:hsla(${hue},70%,65%,0.7);`;
  document.body.appendChild(dot);
  setTimeout(() => dot.remove(), 600);
});

// Ring follows with lag
(function animRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px';
  ring.style.top  = ry + 'px';
  requestAnimationFrame(animRing);
})();

/* =========================================================
   PARALLAX on mouse move
   ========================================================= */
document.addEventListener('mousemove', e => {
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  document.querySelectorAll('.parallax-layer').forEach(el => {
    const speed = parseFloat(el.dataset.speed) || 0.02;
    const dx = (e.clientX - cx) * speed;
    const dy = (e.clientY - cy) * speed;
    el.style.transform = `translate(${dx}px, ${dy}px)`;
  });
});

/* =========================================================
   STARS
   ========================================================= */
(function() {
  const c = document.getElementById('stars-canvas');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize() { c.width = innerWidth; c.height = innerHeight; }
  resize(); window.addEventListener('resize', () => { resize(); init(); });
  function init() {
    stars = Array.from({length:220}, () => ({
      x: Math.random()*c.width, y: Math.random()*c.height,
      r: Math.random()*1.5+0.2, a: Math.random(),
      speed: Math.random()*0.005+0.002, phase: Math.random()*Math.PI*2
    }));
  }
  init();
  function draw(t) {
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s => {
      const alpha = 0.3 + 0.7*(0.5 + 0.5*Math.sin(t*s.speed*60+s.phase));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(240,220,170,${alpha*s.a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

/* =========================================================
   SHOOTING STARS
   ========================================================= */
(function() {
  const c = document.getElementById('shoot-canvas');
  const ctx = c.getContext('2d');
  let shots = [];
  function resize() { c.width = innerWidth; c.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);

  function spawnShot() {
    shots.push({
      x: Math.random()*c.width, y: 0,
      len: 80+Math.random()*120,
      speed: 8+Math.random()*10,
      angle: 30+Math.random()*20,
      life: 1
    });
  }
  setInterval(spawnShot, 2800);

  function draw() {
    ctx.clearRect(0,0,c.width,c.height);
    shots = shots.filter(s => s.life > 0);
    shots.forEach(s => {
      const rad = s.angle * Math.PI/180;
      const ex = s.x + Math.cos(rad)*s.len*s.life;
      const ey = s.y + Math.sin(rad)*s.len*s.life;
      const grad = ctx.createLinearGradient(s.x,s.y,ex,ey);
      grad.addColorStop(0, `rgba(240,204,128,${s.life})`);
      grad.addColorStop(1, 'transparent');
      ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(ex,ey);
      ctx.strokeStyle = grad; ctx.lineWidth = 1.5; ctx.stroke();
      s.x += Math.cos(rad)*s.speed; s.y += Math.sin(rad)*s.speed;
      s.life -= 0.018;
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

/* =========================================================
   CONFETTI + FIREWORKS
   ========================================================= */
const confCanvas = document.getElementById('confetti-canvas');
const confCtx = confCanvas.getContext('2d');
let particles = [];
function resizeConf() { confCanvas.width = innerWidth; confCanvas.height = innerHeight; }
resizeConf(); window.addEventListener('resize', resizeConf);

const confColors = ['#d4a853','#f0cc80','#c2576a','#7b5ea7','#5ab4d6','#f5ede0','#ff9fba','#ffe066'];

function burst(ox, oy, count=180) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = 2+Math.random()*9;
    const isCircle = Math.random()>0.5;
    particles.push({
      x: ox ?? Math.random()*confCanvas.width,
      y: oy ?? -10,
      w: isCircle ? (3+Math.random()*6) : (4+Math.random()*8),
      h: isCircle ? (3+Math.random()*6) : (2+Math.random()*5),
      color: confColors[Math.floor(Math.random()*confColors.length)],
      vx: ox ? Math.cos(angle)*speed : (Math.random()-0.5)*6,
      vy: ox ? Math.sin(angle)*speed : (2+Math.random()*4),
      angle: Math.random()*360,
      spin: (Math.random()-0.5)*10,
      life: 1, isCircle
    });
  }
}

function animConf() {
  confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  particles = particles.filter(p=>p.life>0);
  particles.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.angle+=p.spin; p.life-=0.007;
    confCtx.save(); confCtx.globalAlpha=p.life;
    confCtx.translate(p.x,p.y); confCtx.rotate(p.angle*Math.PI/180);
    confCtx.fillStyle=p.color;
    if(p.isCircle){ confCtx.beginPath(); confCtx.arc(0,0,p.w/2,0,Math.PI*2); confCtx.fill(); }
    else { confCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h); }
    confCtx.restore();
  });
  requestAnimationFrame(animConf);
}
requestAnimationFrame(animConf);

// Celebrate button
document.getElementById('celebrateBtn').addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  const ripple = document.createElement('span');
  ripple.className = 'btn-ripple';
  ripple.style.cssText = `width:${rect.width}px;height:${rect.width}px;left:${e.clientX-rect.left-rect.width/2}px;top:${e.clientY-rect.top-rect.width/2}px`;
  this.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  for(let i=0;i<6;i++) setTimeout(()=>burst(null,null,200), i*200);
  spawnWishes();
});

// Auto burst on load
setTimeout(() => burst(), 2500);

/* =========================================================
   CLICK ANYWHERE = FIREWORKS
   ========================================================= */
const wishes = [
  '🍔 Diet starts tomorrow!','✨ Another year of magic','🎉 Celebrate you!',
  '🐘 Stop eating so much cake','🎊 Joy & love always','🌸 Keep shining',
  '🥂 To your best year','💛 You deserve it all','🎈 Still weird, but I tolerate you'
];

document.addEventListener('click', e => {
  const tag = e.target.tagName;
  if(tag === 'BUTTON' || e.target.classList.contains('candle-btn') || e.target.classList.contains('balloon')) return;
  burst(e.clientX, e.clientY, 60);
  // Random sparkle
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.textContent = ['✨','⭐','💫','🌟','✦'][Math.floor(Math.random()*5)];
  s.style.left = e.clientX + 'px'; s.style.top = e.clientY + 'px';
  document.body.appendChild(s);
  setTimeout(()=>s.remove(), 800);
});

/* =========================================================
   WISH BUBBLES
   ========================================================= */
const cloud = document.getElementById('wish-cloud');
function spawnWish(x, y) {
  const b = document.createElement('div');
  b.className = 'wish-bubble';
  b.textContent = wishes[Math.floor(Math.random()*wishes.length)];
  b.style.left = (x ?? 10+Math.random()*80) + '%';
  b.style.top  = (y ?? 20+Math.random()*60) + '%';
  cloud.appendChild(b);
  setTimeout(()=>b.remove(), 3500);
}
function spawnWishes() {
  for(let i=0;i<5;i++) setTimeout(()=>spawnWish(), i*300);
}
setTimeout(spawnWishes, 3000);

/* =========================================================
   BALLOONS (clickable pop)
   ========================================================= */
(function() {
  const wrap = document.getElementById('balloons');
  const emojis = ['🎈','🎈','🎉','🎊','🎈'];
  for(let i=0;i<12;i++){
    const b = document.createElement('div');
    b.className = 'balloon';
    b.textContent = emojis[i%emojis.length];
    b.style.setProperty('--delay', Math.random()*8+'s');
    b.style.setProperty('--dur', 8+Math.random()*10+'s');
    b.style.setProperty('--left', Math.random()*95+'%');
    b.addEventListener('click', e => {
      e.stopPropagation();
      burst(e.clientX, e.clientY, 80);
      b.style.animation = 'none'; b.style.opacity='0'; b.style.transform='scale(2)';
      setTimeout(()=>b.remove(), 300);
      spawnWish(parseInt(b.style.getPropertyValue('--left')), null);
    });
    wrap.appendChild(b);
  }
})();

/* =========================================================
   INTERACTIVE CANDLES
   ========================================================= */
(function() {
  const row = document.getElementById('candles-row');
  const hint = document.getElementById('blow-hint');
  let lit = 5;
  for(let i=0;i<5;i++){
    const btn = document.createElement('button');
    btn.className = 'candle-btn';
    btn.innerHTML = '<span class="flame">🕯️</span>';
    btn.setAttribute('title','Click to blow out');
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if(btn.classList.contains('blown')) return;
      btn.classList.add('blown');
      btn.querySelector('.flame').style.opacity='0';
      lit--;
      if(lit===0){
        hint.textContent = "🎉 All candles blown! (Don't wish for more food, you've had enough 🐘)";
        burst(null,null,300);
        spawnWishes();
        document.getElementById('cake-emoji').textContent = '✨';
        setTimeout(()=> document.getElementById('cake-emoji').textContent='🎂', 2000);
      } else {
        hint.textContent = `${lit} candle${lit>1?'s':''} left — keep going! 💨`;
      }
    });
    row.appendChild(btn);
  }
})();

/* =========================================================
   TYPEWRITER MESSAGE
   ========================================================= */
(function() {
  const msg = [
    "May this day overflow with joy, laughter, and all the love you deserve.\n\n",
    "Here's to new adventures, bigger dreams, and another year of being the incredible person you are.\n\n",
    "The world is bigger because you're in it... mostly because you take up so much space, fatty! 🐘🎈\n\n",
    "Just kidding! You're the best. 🌟"
  ].join('');

  const el = document.getElementById('typed-msg');
  const cursorEl = document.getElementById('typed-cursor');
  let i = 0;

  function type() {
    if(i < msg.length) {
      const ch = msg[i++];
      const span = document.createElement('span');
      span.textContent = ch === '\n' ? '' : ch;
      if(ch === '\n') {
        const br = document.createElement('br');
        el.insertBefore(br, cursorEl);
      } else {
        el.insertBefore(span, cursorEl);
      }
      setTimeout(type, ch === '\n' ? 400 : 30+Math.random()*25);
    } else {
      cursorEl.remove();
    }
  }
  setTimeout(type, 2000);
})();

/* =========================================================
   LIVE CELEBRATORY COUNTERS
   ========================================================= */
(function() {
  const start = Date.now();
  const display = document.getElementById('age-display');
  const units = [
    {label:'Smiles',mult:24,base:0},
    {label:'Adventures',mult:7,base:0},
    {label:'Memories',mult:365,base:0},
    {label:'Moments of Brilliance',mult:8760,base:0}
  ];

  function update() {
    const elapsed = (Date.now() - start) / 1000;
    display.innerHTML = '';
    units.forEach((u,i) => {
      const val = Math.floor(elapsed*(1+i*0.7)+i*42);
      const box = document.createElement('div');
      box.className = 'age-box';
      box.innerHTML = `<div class="age-num">${val.toLocaleString()}</div><div class="age-unit">${u.label}</div>`;
      display.appendChild(box);
    });
  }
  setInterval(update, 50);
  update();
})();

/* =========================================================
   BIRTHDAY word click = color cycle
   ========================================================= */
const bdayWord = document.getElementById('bday-word');
const gradients = [
  'linear-gradient(135deg,#f0cc80,#d4a853,#c2576a,#f0cc80)',
  'linear-gradient(135deg,#c2576a,#ff9fba,#d4a853,#c2576a)',
  'linear-gradient(135deg,#7b5ea7,#5ab4d6,#d4a853,#7b5ea7)',
  'linear-gradient(135deg,#5ab4d6,#f0cc80,#c2576a,#5ab4d6)',
];
let gIdx=0;
bdayWord.addEventListener('click', e => {
  e.stopPropagation();
  gIdx=(gIdx+1)%gradients.length;
  bdayWord.style.backgroundImage = gradients[gIdx];
  burst(e.clientX,e.clientY,50);
});

/* =========================================================
   MUSIC VIBES TOGGLE (visual pulse, no actual audio needed)
   ========================================================= */
const musicBtn = document.getElementById('music-btn');
let musicOn = false;
let noteInterval;
const noteEmojis = ['♩','♪','♫','♬','🎵','🎶'];
musicBtn.addEventListener('click', e => {
  e.stopPropagation();
  musicOn = !musicOn;
  musicBtn.classList.toggle('playing', musicOn);
  musicBtn.textContent = musicOn ? '♫' : '♪';
  if(musicOn) {
    noteInterval = setInterval(() => {
      const note = document.createElement('div');
      note.className = 'sparkle';
      note.textContent = noteEmojis[Math.floor(Math.random()*noteEmojis.length)];
      note.style.left = (50+Math.random()*40)+'%';
      note.style.bottom = (2+Math.random()*20)+'%';
      note.style.top = 'auto';
      note.style.fontSize = (0.8+Math.random()*0.8)+'rem';
      note.style.color = 'rgba(212,168,83,0.8)';
      document.body.appendChild(note);
      setTimeout(()=>note.remove(), 800);
    }, 500);
  } else {
    clearInterval(noteInterval);
  }
});
